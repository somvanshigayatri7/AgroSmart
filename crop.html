<!DOCTYPE html>
<html>
<head>
  <title>Smart Crop Planner</title>

  <style>
  body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(to right, #56ab2f, #a8e063);
    transition: 0.4s;
  }

  .dark {
    background: #121212;
    color: white;
  }

  h1 {
    text-align: center;
    color: white;
    padding: 20px;
  }
.back {
  display: inline-block;
  margin: 10px 20px;
  padding: 10px 18px;
  background: white;
  color: black;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.back:hover {
  background: #dcedc8;
  transform: scale(1.05);
}

  /* TOP BAR */
  .top {
    text-align: center;
    margin: 10px;
  }

  .top button, .back {
    padding: 8px 15px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    background: white;
    color: black;
    font-weight: bold;
  }

  /* GRID */
  .crops {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 15px;
    padding: 20px;
  }

  .crop {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 120px;
    background: white;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
  }

  .crop:hover {
    transform: scale(1.05);
    background: #dcedc8;
  }

  .icon {
    font-size: 40px;
    pointer-events: none;
  }

  .crop span {
    pointer-events: none;
  }

  /* DETAILS */
  .details {
    padding: 20px;
    display: none;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    animation: fade 0.5s;
  }

  .card img {
    width: 100%;
    border-radius: 10px;
  }

  @keyframes fade {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
  }

  </style>
</head>

<body id="body">


<h1>🌾 स्मार्ट पिक नियोजन</h1>
<a href="index.html">⬅ Home</a>
<div class="crops">

<div class="crop" onclick="show('tomato')">
  <span class="icon">🍅</span>
  <span>Tomato (टोमॅटो)</span>
</div>

<div class="crop" onclick="show('rice')">
  <span class="icon">🌾</span>
  <span>Rice (तांदूळ)</span>
</div>

<div class="crop" onclick="show('wheat')">
  <span class="icon">🌿</span>
  <span>Wheat (गहू)</span>
</div>

<div class="crop" onclick="show('corn')">
  <span class="icon">🌽</span>
  <span>Corn (मका)</span>
</div>

<div class="crop" onclick="show('cotton')">
  <span class="icon">🌼</span>
  <span>Cotton (कापूस)</span>
</div>

<div class="crop" onclick="show('sugarcane')">
  <span class="icon">🎋</span>
  <span>Sugarcane (ऊस)</span>
</div>

<div class="crop" onclick="show('potato')">
  <span class="icon">🥔</span>
  <span>Potato (बटाटा)</span>
</div>

<div class="crop" onclick="show('onion')">
  <span class="icon">🧅</span>
  <span>Onion (कांदा)</span>
</div>

<div class="crop" onclick="show('carrot')">
  <span class="icon">🥕</span>
  <span>Carrot (गाजर)</span>
</div>

<div class="crop" onclick="show('soybean')">
  <span class="icon">🌱</span>
  <span>Soybean (सोयाबीन)</span>
</div>

</div>
<!-- DETAILS -->
<div class="details" id="details">
  <div class="card" id="card"></div>
</div>

};

document.getElementById("details").style.display = "block";

document.getElementById("card").innerHTML =
`<img src="${data[crop].img}">
<br><br>
${data[crop][lang]}`;

}

</script>

</body>
</html>
